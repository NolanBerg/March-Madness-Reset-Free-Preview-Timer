<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      color: #f97316;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label {
      font-size: 12px;
      color: #a0a0b0;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 11px;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #f97316;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .interval-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .interval-row label {
      flex-shrink: 0;
    }
    .interval-row input {
      width: 50px;
      padding: 4px 6px;
      background: #2a2a3e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      text-align: center;
    }
    .interval-row input:focus {
      outline: none;
      border-color: #f97316;
    }
    .interval-row span {
      font-size: 12px;
      color: #a0a0b0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }
    button:hover { background: #ea580c; }
    button:active { transform: scale(0.98); }
    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>MM Preview Reset</h1>

  <div class="row">
    <label>Auto-reset</label>
    <label class="toggle">
      <input type="checkbox" id="autoToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="interval-row">
    <label>Interval</label>
    <input type="number" id="intervalInput" min="1" max="60" value="9">
    <span>min</span>
  </div>

  <button id="resetBtn">Reset Now</button>

  <div class="status" id="status">—</div>

  <script src="popup.js"></script>
</body>
</html>
